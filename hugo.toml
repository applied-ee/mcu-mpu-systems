baseURL = "https://applied-ee.github.io/mcu-mpu-systems/"
languageCode = "en-us"
title = "MCU & MPU Systems"
theme = "hugo-book"

# Enable git-based last modified dates
enableGitInfo = true

# Book theme configuration
[params]
  # Sidebar title (shorter than full site title)
  BookTitle = "Contents"
  # Theme: auto follows system preference, or use "light" / "dark"
  BookTheme = "auto"
  # Show table of contents on the right
  BookToC = true
  # Enable search (requires extended Hugo)
  BookSearch = true
  # Repository for commit links
  BookRepo = "https://github.com/applied-ee/mcu-mpu-systems"
  # Folder for menu resources
  BookMenuBundle = "/menu"
  # Section to use for the homepage
  BookSection = "docs"
  # Set site description for SEO
  description = "A structured notebook on microcontroller and microprocessor systems — architecture, peripherals, firmware, and hands-on development"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 1
    endLevel = 4
